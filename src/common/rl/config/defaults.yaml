# Default training configuration (Brax / MJX).
# Override any key via --config on the CLI.

training:
  total_timesteps: 10_000_000
  num_envs: 4096            # Brax vectorises via jax.vmap (GPU)
  seed: 42

env:
  max_episode_steps: 500
  control_dt: 0.01          # 100 Hz control loop (matches ros2_control)
  physics_dt: 0.001         # MuJoCo timestep
  backend: mjx              # Simulation backend (mjx)

algorithms:
  ppo:
    # Brax PPO parameter names
    learning_rate: 3.0e-4
    unroll_length: 20         # Rollout steps per env per update
    num_minibatches: 32
    num_updates_per_batch: 4
    discounting: 0.99
    gae_lambda: 0.95
    clipping_epsilon: 0.2
    entropy_cost: 0.0
    vf_loss_coefficient: 0.5
    max_grad_norm: 0.5
    normalize_observations: true
    reward_scaling: 1.0
    network_factory_kwargs:
      hidden_layer_sizes: [256, 256]

  sac:
    # Brax SAC parameter names
    learning_rate: 3.0e-4
    max_replay_size: 1_000_000
    min_replay_size: 10_000
    batch_size: 256
    tau: 0.005
    discounting: 0.99
    normalize_observations: true
    reward_scaling: 1.0
    network_factory_kwargs:
      hidden_layer_sizes: [256, 256]

callbacks:
  redis:
    enabled: true
    host: redis
    port: 6379
    password: ""             # Set via REDIS_PASS env var if needed
  mlflow:
    enabled: true
    tracking_uri: "http://mlflow:5000"

export:
  onnx: true
